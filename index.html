<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJ's Sketchbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=AR+One+Sans&family=Source+Han+Sans+SC&family=Noto+Sans+HK&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F2F2F1;
            --text: #666666;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .en-special { font-family: "Special Elite", serif; }
        .code { font-family: "AR One Sans", sans-serif; }
        .cn-serif { font-family: "Source Han Sans SC", "Noto Sans HK", sans-serif; }

        header {
            position: relative;
            background: transparent;
            z-index: 100;
        }
        .nav {
            max-width: 1200px;
            margin: 10px auto 0;
            padding: 0px 24px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            font-size: 14px;
        }
        .nav a {
            color: var(--text);
            text-decoration: none;
            opacity: 0.7;
            transition: all 0.2s ease;
            display: inline-block;
            transform-origin: bottom center;
        }
        .nav a:hover { opacity: 1; }
        .nav a:active {
            color: #ccc;
            transform: perspective(500px) rotateX(60deg) skewX(-15deg);
        }
        .nav-left { justify-self: start; }
        .nav-center { justify-self: center; }
        .nav-right { justify-self: end; display: flex; gap: 20px; }

        .container {
            max-width: 1200px;
            margin: -90px auto 0;
            padding: 0 24px 80px;
            display: grid;
            grid-template-columns: 1.05fr 1fr;
            gap: 2px;
            align-items: start;
            min-height: calc(100vh - 180px);
        }
        .intro {
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            min-height: 100px;
        }
        .intro-top {
            margin-bottom: 20px;
            padding-top: 210px;
        }
        .intro-cta {
            margin-top: 150px;
            padding-left: 320px;
        }

        .char {
            display: inline-block;
            opacity: 0;
            transform: translateY(40px) skewY(10deg);
            animation: floatUpChar 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            white-space: pre;
        }
        @keyframes floatUpChar {
            0% { opacity: 0; transform: translateY(40px) skewY(10deg) rotate(5deg); }
            100% { opacity: 1; transform: translateY(0) skewY(0) rotate(0deg); }
        }
        @keyframes driftAway {
            0% { opacity: 1; transform: translate(0, 0) rotate(0deg); filter: blur(0); }
            100% { opacity: 0; transform: translate(30px, -30px) rotate(15deg); filter: blur(3px); }
        }

        .intro h1, .intro h2, .intro p {
            margin: 0;
            font-weight: 500;
            font-size: 18px;
            line-height: 1.8;
            font-family: "Special Elite", serif;
        }
        .intro h1 { margin-bottom: 8px; }

        .visual {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 0;
            margin-top: 40px;
        }
        .tree-wrap {
            position: relative;
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
        }
        .tree {
            width: 100%;
            height: auto;
            display: block;
            opacity: 1;
            pointer-events: none;
            transition: opacity 0.8s ease-out;
        }

        .label {
            position: absolute;
            color: var(--text);
            font-size: 10px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            letter-spacing: 0.5px;
            opacity: 0.9;
            z-index: 20;
            pointer-events: auto;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
        }
        .label:hover { opacity: 1; }
        .label.experience { top: 29%; left: 25%; }
        .label.portfolio { top: 54%; left: 20%; }
        .label.introduction { top: 56%; left: 82%; }
        .label.reflections { top: 32%; left: 68%; }

        #p5-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: auto;
        }
        #p5-overlay canvas {
            width: 100% !important;
            height: auto !important;
            display: block;
        }

        footer {
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            margin-top: 24px;
        }
        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 18px 24px 28px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            font-size: 13px;
        }
        .footer-item b { display: block; font-weight: 500; margin-bottom: 6px; }

        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; }
            .intro { text-align: center; }
            .intro-cta { margin-top: 32px; padding-left: 0; }
            .visual .tree-wrap { max-width: 420px; }
            .label.introduction { bottom: 18%; right: 15%; }
        }
        @media (max-width: 480px) {
            .nav { padding: 0 16px; font-size: 12px; }
            .container { padding: 0 16px 64px; margin-top: 50px; }
            .intro h1, .intro h2, .intro p { font-size: 15px; line-height: 1.5; }
            .visual .tree-wrap { max-width: 400px; }
            .footer-inner { grid-template-columns: 1fr 1fr; row-gap: 16px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <header>
        <nav class="nav">
            <div class="nav-left"><a href="./works.html">Works</a></div>
            <div class="nav-center"></div>
            <div class="nav-right">
                <a href="./experience.html">Experience</a>
                <a href="./reflections.html">Reflections</a>
                <a href="./about.html">About</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="intro">
            <div class="intro-top">
                <h1>Hi,</h1>
                <h2>This Is Chengru Ju's Sketchbook.</h2>
            </div>
            <div class="intro-cta">
                <p>Let's Flip Through It.</p>
            </div>
        </section>

        <div class="visual">
            <div class="tree-wrap">
                <img src="./tree.png" alt="Tree illustration" class="tree">
                <div id="p5-overlay"></div>
                <a href="./experience.html" class="label experience">个人经历 / Experience</a>
                <a href="./works.html" class="label portfolio">作品集 / Portfolio</a>
                <a href="./about.html" class="label introduction">自我介绍 / Introduction</a>
                <a href="./reflections.html" class="label reflections">沉思 / Reflections</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <div class="footer-item">
                <b>Email</b>
                cj2752@columbia.edu
            </div>
            <div class="footer-item">
                <b>Instagram</b>
                @salmonpinkrose
            </div>
            <div class="footer-item">
                <b>LinkedIn</b>
                <a href="https://www.linkedin.com/in/chengru-ju-" target="_blank" style="color: var(--text); text-decoration: none;">linkedin.com/in/chengru-ju-</a>
            </div>
            <div class="footer-item">
                <b>Rights</b>
                Sonnet 5 by William Shakespeare
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <script>
        let treeImg;
        let particles = [];
        let branchPoints = [];
        let poem = "Those hours that with gentle work did frame The lovely gaze where every eye doth dwell, Will play the tyrants to the very same And that unfair which fairly doth excel: For never-resting time leads summer on To hideous winter and confounds him there; Sap check'd with frost and lusty leaves quite gone, Beauty o'ersnow'd and bareness every where: Then, were not summer's distillation left, A liquid prisoner pent in walls of glass, Beauty's effect with beauty were bereft, Nor it, nor no remembrance what it was: But flowers distill'd, though they with winter meet, Leese but their show; their substance still lives sweet.";
        let poemIndex = 0;
        let isFinished = false;
        let groundMap = [];
        let currentSway = 0;
        let mobileShakeTimer = 0;
        let config = {
            fontSize: 15,
            maxFallSpeed: 1.5,
            drag: 0.97,
            spawnIntensity: 12,
            swayAmplitude: 0.03,
            letterSpacing: 20,
            groundY: 0.95,
            driftRange: 0.5,
            rotateSpeed: 0.7,
            margin: 0.2
        };

        function preload() {
            treeImg = loadImage('./tree.png', () => {
                console.log("Tree image loaded successfully");
            }, (err) => {
                console.error("Failed to load tree image:", err);
            });
        }

        function setup() {
            pixelDensity(1);
            let c = createCanvas(treeImg.width, treeImg.height);
            c.parent('p5-overlay');
            let baseLine = height * config.groundY;
            for (let i = 0; i < width; i++) groundMap[i] = baseLine;
            treeImg.loadPixels();
            for (let x = 0; x < treeImg.width; x += 6) {
                for (let y = 0; y < treeImg.height; y += 6) {
                    let index = (x + y * treeImg.width) * 4;
                    if (treeImg.pixels[index + 3] > 50) branchPoints.push({ x, y });
                }
            }
            textFont('Georgia');
            textSize(config.fontSize);
            textAlign(CENTER, CENTER);
        }

        let hasHiddenStaticTree = false;

        function draw() {
            clear();
            let canvasElem = document.querySelector('#p5-overlay canvas');
            let effectiveMouseX = mouseX;
            let effectiveMouseY = mouseY;
            if (canvasElem) {
                effectiveMouseX = mouseX * (width / canvasElem.offsetWidth);
                effectiveMouseY = mouseY * (height / canvasElem.offsetHeight);
            }
            let m = width * config.margin;
            let isMouseHovering = (effectiveMouseX > m && effectiveMouseX < width - m && effectiveMouseY > m && effectiveMouseY < height - m);
            if (mobileShakeTimer > 0) {
                mobileShakeTimer--;
            }
            let isHovering = isMouseHovering || (mobileShakeTimer > 0);
            if (!hasHiddenStaticTree && frameCount > 5) {
                let staticTree = document.querySelector('.tree');
                if (staticTree) staticTree.style.opacity = '0';
                hasHiddenStaticTree = true;
            }
            let idleSway = sin(frameCount * 0.018) * config.swayAmplitude * 0.35
                         + sin(frameCount * 0.031) * config.swayAmplitude * 0.15;
            let hoverSway = (isHovering && !isFinished) ? sin(frameCount * 0.08) * config.swayAmplitude : 0;
            let targetSway = idleSway + hoverSway;
            currentSway = lerp(currentSway, targetSway, 0.04);
            push();
            translate(width / 2, height);
            shearX(currentSway);
            image(treeImg, -width / 2, -height, width, height);
            pop();
            if (isHovering && !isFinished) {
                for (let i = 0; i < config.spawnIntensity; i++) {
                    if (poemIndex < poem.length) {
                        let pt = random(branchPoints);
                        if (poem[poemIndex] !== " ") {
                            particles.push(new Letter(pt.x, pt.y, poem[poemIndex]));
                        }
                        poemIndex++;
                    } else {
                        isFinished = true;
                    }
                }
            }
            for (let p of particles) {
                p.update();
                p.display();
            }
            if (canvasElem) {
                let cssHeight = canvasElem.offsetHeight;
                let labels = [
                    { sel: '.label.experience', h: 0.71, noiseOff: 100 },
                    { sel: '.label.portfolio', h: 0.46, noiseOff: 200 },
                    { sel: '.label.introduction', h: 0.25, noiseOff: 300 },
                    { sel: '.label.reflections', h: 0.68, noiseOff: 400 }
                ];
                for (let l of labels) {
                    let elem = document.querySelector(l.sel);
                    if (elem) {
                        let swayX = -cssHeight * l.h * Math.tan(currentSway);
                        let windNoise = noise(frameCount * 0.01 + l.noiseOff);
                        let wind = (windNoise - 0.5) * 0.2;
                        let baseSway = currentSway * 0.9;
                        let rot = baseSway + wind;
                        let softSkew = rot * 15;
                        elem.style.transformOrigin = "top center";
                        elem.style.transform = `translateX(${swayX}px) rotate(${rot}rad) skewX(${softSkew}deg)`;
                    }
                }
            }
        }

        class Letter {
            constructor(x, y, char) {
                this.pos = createVector(x, y);
                this.vel = createVector(random(-0.5, 0.5), random(0.1, 0.5));
                this.acc = createVector(0, 0.04);
                this.char = char;
                this.isStatic = false;
                this.angle = random(TWO_PI);
                this.noiseSeed = random(1000);
                this.finalAngle = random(-0.4, 0.4);
            }

            update() {
                if (this.isStatic) return;
                let breeze = map(noise(this.noiseSeed, frameCount * 0.015), 0, 1, -config.driftRange, config.driftRange);
                this.vel.x += breeze * 0.15;
                this.vel.add(this.acc);
                this.vel.mult(config.drag);
                if (this.vel.y > config.maxFallSpeed) this.vel.y = config.maxFallSpeed;
                this.pos.add(this.vel);
                this.angle += (this.vel.mag() * 0.08) * config.rotateSpeed;
                let xIdx = floor(constrain(this.pos.x, 0, width - 1));
                if (this.pos.y >= groundMap[xIdx]) {
                    this.pos.y = groundMap[xIdx];
                    this.isStatic = true;
                    let r = config.letterSpacing / 2;
                    for (let i = -r; i <= r; i++) {
                        let checkX = floor(constrain(xIdx + i, 0, width - 1));
                        let lift = map(abs(i), 0, r, config.fontSize * 0.65, 0);
                        groundMap[checkX] -= lift;
                    }
                }
            }

            display() {
                push();
                translate(this.pos.x, this.pos.y);
                rotate(this.isStatic ? this.finalAngle : this.angle);
                fill(70, this.isStatic ? 200 : 160);
                noStroke();
                text(this.char, 0, 0);
                pop();
            }
        }

        function mousePressed() {
            handleInput();
        }

        function touchStarted() {
            handleInput();
        }

        function handleInput() {
            let canvasElem = document.querySelector('#p5-overlay canvas');
            if (canvasElem) {
                if (mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
                    mobileShakeTimer = 180;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const targets = [
                { sel: '.intro-top h1', baseDelay: 0.1 },
                { sel: '.intro-top h2', baseDelay: 0.2 },
                { sel: '.intro-cta p', baseDelay: 2 }
            ];
            targets.forEach(target => {
                const el = document.querySelector(target.sel);
                if (el) {
                    const text = el.textContent;
                    let html = '';
                    for (let i = 0; i < text.length; i++) {
                        const char = text[i];
                        const randomDelay = Math.random() * 0.8;
                        const indexDelay = i * 0.02;
                        const totalDelay = target.baseDelay + randomDelay + indexDelay;
                        if (target.sel === '.intro-cta p') {
                            const vanishDelay = totalDelay + 1 + 3 + Math.random() * 0.5;
                            html += `<span class="char" style="animation-name: floatUpChar, driftAway; animation-duration: 1s, 2s; animation-delay: ${totalDelay}s, ${vanishDelay}s; animation-fill-mode: forwards, forwards;">${char}</span>`;
                        } else {
                            html += `<span class="char" style="animation-delay: ${totalDelay}s">${char}</span>`;
                        }
                    }
                    el.innerHTML = html;
                }
            });
        });
    </script>
</body>
</html>
